<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Wheel — Customizable Decision Wheel by Energon</title>
  <meta name="description" content="A fully customizable decision wheel. Add your own options, icons, and messages. Save and share your wheel via a bookmark link.">
  <meta property="og:title" content="Decision Wheel — Customizable Decision Wheel">
  <meta property="og:description" content="Add your own options, icons, and messages. Bookmark and share any wheel configuration.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://wheel.neorgon.com/">
  <meta property="og:site_name" content="Energon">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Decision Wheel — Customizable Decision Wheel">
  <meta name="twitter:description" content="Add your own options, icons, and messages. Bookmark and share any wheel configuration.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://wheel.neorgon.com/">
  <meta name="theme-color" content="#040714">
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #040714;
      --surface-1: rgba(255,255,255,.03);
      --surface-2: rgba(255,255,255,.06);
      --surface-3: rgba(255,255,255,.10);
      --border-subtle: rgba(255,255,255,.07);
      --border: rgba(255,255,255,.1);
      --border-strong: rgba(255,255,255,.22);
      --text-primary: #f9f9f9;
      --text-secondary: #cacaca;
      --text-muted: rgba(255,255,255,.45);
      --accent: #0063e5;
      --accent-bright: #0080ff;
      --danger: #ef4444;
      --font: 'Avenir Next', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-sm: 6px; --radius: 10px; --radius-lg: 15px; --radius-xl: 20px;
      --ease-snap: cubic-bezier(0.34, 1.56, 0.64, 1);
      --dur: 200ms;
      --settings-w: 380px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      min-height: 100vh;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header-bar {
      background: linear-gradient(135deg, #B015B0 0%, #3D0080 45%, #080010 100%);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 24px;
      height: 68px;
      position: sticky;
      top: 0;
      z-index: 300;
      display: flex;
      align-items: center;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-logo-img {
      height: 36px; width: auto; flex-shrink: 0;
      filter: brightness(0) invert(1);
      transition: transform 0.3s var(--ease-snap);
      display: block;
    }
    .header-logo-img:hover { transform: scale(1.14) rotate(-9deg); }
    .header-logo h1 { font-size: 1.1em; font-weight: 600; letter-spacing: .5px; }
    .header-subtitle { font-size: .8em; color: rgba(255,255,255,.7); font-weight: 500; margin-top: 2px; }
    .header-home {
      margin-left: auto;
      display: flex; align-items: center;
      padding: 5px;
      color: rgba(255,255,255,.9); text-decoration: none;
      border-radius: var(--radius-sm);
      transition: background var(--dur);
    }
    .header-home:hover { background: rgba(255,255,255,.12); }
    .header-home svg { width: 30px; height: 30px; display: block; }

    /* Settings toggle button in header — centered absolutely */
    .btn-settings-header {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      padding: 7px 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: var(--radius-sm);
      color: rgba(255,255,255,.9);
      font-size: .85em; font-weight: 500;
      cursor: pointer;
      transition: background var(--dur), border-color var(--dur);
      flex-shrink: 0;
      animation: settingsBorderPulse 3s ease-in-out infinite;
    }
    .btn-settings-header:hover {
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.5);
      animation: none;
    }
    .btn-settings-header svg { width: 14px; height: 14px; }
    @keyframes settingsBorderPulse {
      0%, 100% { border-color: rgba(255,255,255,.2); box-shadow: none; }
      50%       { border-color: rgba(0,128,255,.7);  box-shadow: 0 0 10px rgba(0,99,229,.4), inset 0 0 6px rgba(0,99,229,.08); }
    }

    /* ── Main layout ────────────────────────────────────────────────────── */
    .app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Wheel stage ────────────────────────────────────────────────────── */
    .wheel-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      min-height: 0;
      transition: padding-right var(--dur);
    }

    .wheel-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 24px;
      text-align: center;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wheel-title-icon { font-size: 1.4rem; }

    .wheel-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    #wheel-canvas {
      display: block;
      max-width: min(600px, calc(100vw - 48px));
      max-height: min(600px, calc(100vw - 48px));
      width: 600px;
      height: 600px;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(0,99,229,.2), 0 0 40px rgba(0,99,229,.15), 0 16px 60px rgba(0,0,0,.6);
    }

    /* Pointer: triangle pointing DOWN at the top of the wheel */
    .wheel-pointer {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 44px solid #0063e5;
      filter: drop-shadow(0 0 8px rgba(0,99,229,.8)) drop-shadow(0 2px 4px rgba(0,0,0,.7));
      z-index: 10;
      animation: pointerBounce 2s ease-in-out infinite;
    }
    .wheel-pointer::after {
      content: '';
      position: absolute;
      top: -44px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 10px;
      background: #4BA3FF;
      border-radius: 50%;
      box-shadow: 0 0 8px #0063e5, 0 0 16px rgba(0,99,229,.5);
    }
    @keyframes pointerBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-5px); }
    }

    /* Spin button */
    .btn-spin {
      margin-top: 28px;
      padding: 14px 48px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background var(--dur), transform var(--dur), box-shadow var(--dur);
      box-shadow: 0 4px 20px rgba(0,99,229,.5);
    }
    .btn-spin:hover:not(:disabled) {
      background: var(--accent-bright);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0,128,255,.6);
    }
    .btn-spin:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-spin.spinning {
      background: #6b21a8;
      box-shadow: 0 4px 20px rgba(107,33,168,.5);
    }

    /* ── Settings drawer ────────────────────────────────────────────────── */
    .settings-drawer {
      width: var(--settings-w);
      flex-shrink: 0;
      background: #06091a;
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width var(--dur), transform var(--dur);
      position: relative;
      z-index: 200;
    }
    .settings-drawer.closed {
      width: 0;
    }
    .settings-drawer-inner {
      width: var(--settings-w);
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .settings-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .settings-header h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .btn-close-settings {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      font-size: 1.2rem;
      transition: color var(--dur), background var(--dur);
    }
    .btn-close-settings:hover { color: var(--text-primary); background: var(--surface-2); }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .settings-body::-webkit-scrollbar { width: 4px; }
    .settings-body::-webkit-scrollbar-track { background: transparent; }
    .settings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .settings-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Setting rows ───────────────────────────────────────────────────── */
    .setting-group { display: flex; flex-direction: column; gap: 8px; }
    .setting-group label {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .setting-row-2 { display: flex; gap: 8px; }
    .setting-row-2 .form-input:first-child { width: 62px; flex-shrink: 0; text-align: center; }

    .form-input {
      flex: 1;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: .875rem;
      font-family: var(--font);
      padding: 8px 10px;
      transition: border-color var(--dur);
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-hint {
      font-size: .72rem;
      color: var(--text-muted);
      margin-top: -4px;
    }

    /* Segments list */
    .segments-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .segment-row {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
    }
    .seg-emoji-input {
      width: 44px;
      flex-shrink: 0;
      text-align: center;
      font-size: 1.1rem;
      padding: 6px 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      outline: none;
    }
    .seg-text-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      color: var(--text-primary);
      font-size: .875rem;
      font-family: var(--font);
      padding: 4px 4px 6px;
      outline: none;
      transition: border-color var(--dur);
    }
    .seg-text-input:focus { border-color: var(--accent); }
    .seg-color-input {
      width: 28px; height: 28px;
      flex-shrink: 0;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      background: none;
      overflow: hidden;
    }
    .seg-color-input::-webkit-color-swatch-wrapper { padding: 0; }
    .seg-color-input::-webkit-color-swatch { border: none; border-radius: 50%; }
    .btn-seg-delete {
      width: 24px; height: 24px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color var(--dur), background var(--dur);
    }
    .btn-seg-delete:hover { color: var(--danger); background: rgba(239,68,68,.1); }
    .btn-seg-msg-toggle {
      width: 22px; height: 22px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .8rem;
      cursor: pointer;
      border-radius: 4px;
      transition: color var(--dur);
      title: 'Custom message';
    }
    .btn-seg-msg-toggle:hover { color: var(--accent-bright); }
    .btn-seg-msg-toggle.has-msg { color: var(--accent-bright); }

    .seg-msg-row {
      display: none;
      padding: 0 8px 6px;
    }
    .seg-msg-row.open { display: block; }
    .seg-msg-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--border);
      color: var(--text-secondary);
      font-size: .8rem;
      font-family: var(--font);
      font-style: italic;
      padding: 4px 0;
      outline: none;
    }
    .seg-msg-input:focus { border-color: var(--accent-bright); }
    .seg-msg-input::placeholder { color: var(--text-muted); }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn-primary {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      font-size: .875rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--dur);
      width: 100%;
    }
    .btn-primary:hover { background: var(--accent-bright); }
    .btn-secondary {
      padding: 9px 16px;
      background: transparent;
      color: var(--text-secondary);
      font-size: .875rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color var(--dur), color var(--dur), background var(--dur);
      width: 100%;
    }
    .btn-secondary:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--surface-1); }
    .btn-ghost {
      padding: 8px 12px;
      background: transparent;
      color: var(--accent-bright);
      font-size: .8rem;
      font-weight: 500;
      border: 1px dashed rgba(0,128,255,.35);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--dur), border-color var(--dur);
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-ghost:hover { background: rgba(0,99,229,.08); border-color: var(--accent); }

    /* ── Result overlay ─────────────────────────────────────────────────── */
    .result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(4,7,20,.75);
      backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .result-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .result-card {
      background: #0e1230;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      padding: 40px 48px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s var(--ease-snap);
      box-shadow: 0 32px 80px rgba(0,0,0,.6);
    }
    .result-overlay.show .result-card {
      transform: scale(1) translateY(0);
    }
    .result-emoji-big {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 16px;
      display: block;
    }
    .result-segment-text {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .result-message {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .result-color-bar {
      height: 4px;
      border-radius: 2px;
      margin: 0 auto 24px;
      width: 60px;
    }
    .btn-spin-again {
      padding: 12px 32px;
      background: var(--surface-3);
      color: var(--text-primary);
      font-size: .9rem;
      font-weight: 600;
      border: 1px solid var(--border-strong);
      border-radius: 50px;
      cursor: pointer;
      transition: background var(--dur), transform var(--dur);
    }
    .btn-spin-again:hover { background: var(--surface-2); transform: scale(1.03); }

    /* ── Result excuses (pipe-separated) ───────────────────────────────────── */
    .result-excuses {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
      text-align: left;
    }
    .result-excuse-item {
      padding: 10px 14px;
      background: rgba(255,255,255,.05);
      border-left: 3px solid var(--item-color, #0063e5);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: .875rem;
      color: var(--text-secondary);
      line-height: 1.45;
      animation: slideInExcuse .35s ease both;
    }
    .result-excuse-item:nth-child(2) { animation-delay: .07s; }
    .result-excuse-item:nth-child(3) { animation-delay: .14s; }
    @keyframes slideInExcuse {
      from { opacity:0; transform: translateX(-12px); }
      to   { opacity:1; transform: translateX(0); }
    }

    /* ── Confetti ───────────────────────────────────────────────────────── */
    .confetti-piece {
      position: fixed;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      z-index: 600;
      pointer-events: none;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg) scaleX(1);  opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scaleX(-1); opacity: 0; }
    }

    /* ── Toast ──────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 700;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: #1a1d35;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: .875rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toast-in .25s ease forwards;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      white-space: nowrap;
    }
    .toast.out { animation: toast-out .25s ease forwards; }
    @keyframes toast-in  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes toast-out { from { opacity:1; } to { opacity:0; transform:translateY(4px); } }

    /* ── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      :root { --settings-w: 100vw; }

      .settings-drawer {
        position: fixed;
        inset: 68px 0 0 0;
        width: 100% !important;
        border-left: none;
        border-top: 1px solid var(--border-subtle);
        transform: translateX(100%);
        transition: transform .3s cubic-bezier(0.16,1,0.3,1);
      }
      .settings-drawer.closed { width: 100% !important; transform: translateX(100%); }
      .settings-drawer:not(.closed) { transform: translateX(0); }
      .settings-drawer-inner { width: 100%; }

      .btn-spin { padding: 13px 40px; }
      #wheel-canvas { width: 360px; height: 360px; }
    }

    /* ── Help button & menu ─────────────────────────────────────────────────── */
    .help-button {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 44px; height: 44px;
      background: var(--accent);
      border: none; border-radius: 50%;
      color: #fff;
      font-size: 1.2rem; font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,99,229,.5);
      z-index: 400;
      transition: transform var(--dur), box-shadow var(--dur);
    }
    .help-button:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(0,99,229,.7); }
    .help-menu {
      position: fixed;
      bottom: 80px; right: 24px;
      width: 280px;
      background: #0e1230;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      padding: 20px;
      z-index: 400;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
      transform: scale(0.9) translateY(10px);
      transform-origin: bottom right;
      opacity: 0;
      pointer-events: none;
      transition: transform .2s var(--ease-snap), opacity .2s;
    }
    .help-menu.show { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }
    .help-menu h3 { font-size: .7rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .help-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border-subtle); font-size: .8rem; }
    .help-row:last-child { border-bottom: none; }
    .help-key {
      display: inline-block;
      padding: 2px 7px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: monospace;
      font-size: .78rem;
      color: var(--accent-bright);
    }
    .help-section { margin-top: 12px; }

    /* ── Explosion Easter Egg ───────────────────────────────────────────────── */
    .explosion-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 900;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }

<script>
'use strict';

/* ── Helpers (defined early so TEMPLATES can use deepClone) ──────────────── */
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

/* ── Defaults ────────────────────────────────────────────────────────────── */
const PALETTE = [
  '#7c3aed','#0063e5','#059669','#dc2626','#d97706',
  '#0891b2','#be185d','#65a30d','#9333ea','#f59e0b',
  '#1d4ed8','#15803d','#b45309','#7e22ce','#0e7490',
];

const TEMPLATES = {
  blameGame: {
    title: 'Blame Game', icon: '🎯', version: 2,
    winMessage: '🎯 {result} is to blame today!',
    segments: [
      { id:1,  emoji:'', text:'INFRA', color:'#0063e5', key:'I', message:"They took down prod with a config change|Their deployment pipeline is broken again|Their staging environment doesn't match prod" },
      { id:2,  emoji:'', text:'DBAs',  color:'#1E5ACC', key:'D', message:"Their ETL job failed silently for 3 days|They changed the schema without telling anyone|Their database is locked and nobody knows why" },
      { id:3,  emoji:'', text:'QA',    color:'#4BA3FF', key:'Q', message:"They found a critical bug 10 minutes before release|Their test environment has been down all week|They're still waiting on a test case from last sprint" },
      { id:4,  emoji:'', text:'DEVS',  color:'#8A4FFF', key:'V', message:"Their code works on their machine, nobody else's|They built something nobody asked for|They can't fix the bug because they can't reproduce it" },
      { id:5,  emoji:'', text:'PM',    color:'#5E3AA0', key:'P', message:"They scheduled a 4-hour retrospective during crunch|They want to stop and re-estimate the entire backlog|They blocked everyone waiting for a 1-line approval" },
      { id:6,  emoji:'', text:'CLOUD', color:'#00A8E1', key:'C', message:"Their service mesh decided to drop 30% of requests|They hit the rate limit on a free tier in production|Their load balancer routed all traffic to one dead pod" },
    ],
  },
  pizza: {
    title: 'What should we eat?', icon: '🍽️',
    winMessage: '🎉 {emoji} {result}!',
    segments: [
      { id:11, emoji:'🍕', text:'Pizza',   color:'#dc2626', message:'Pizza night! 🎊' },
      { id:12, emoji:'🍔', text:'Burgers', color:'#d97706', message:'' },
      { id:13, emoji:'🌮', text:'Tacos',   color:'#059669', message:'Taco Tuesday! 🌮' },
      { id:14, emoji:'🍜', text:'Ramen',   color:'#0891b2', message:'' },
      { id:15, emoji:'🍣', text:'Sushi',   color:'#9333ea', message:'' },
      { id:16, emoji:'🥗', text:'Salad',   color:'#65a30d', message:'Healthy choice! 💪' },
    ],
  },
};

const DEFAULT_CONFIG = deepClone(TEMPLATES.blameGame);

/* ── State ───────────────────────────────────────────────────────────────── */
let config = deepClone(DEFAULT_CONFIG);
let currentRotation = 0;
let spinning = false;
let nextId = 100;

/* ── Serialization / sharing ─────────────────────────────────────────────── */
function encodeConfig(cfg) {
  try { return btoa(encodeURIComponent(JSON.stringify(cfg))); }
  catch { return null; }
}
function decodeConfig(str) {
  try { return JSON.parse(decodeURIComponent(atob(str))); }
  catch { return null; }
}
function saveToStorage() {
  try { localStorage.setItem('wheelConfig', JSON.stringify(config)); } catch {}
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem('wheelConfig');
    if (raw) { const c = JSON.parse(raw); if (isValidConfig(c)) return c; }
  } catch {}
  return null;
}
function isValidConfig(c) {
  return c && typeof c.title === 'string' && Array.isArray(c.segments) && c.segments.length >= 2;
}
function copyShareLink() {
  const encoded = encodeConfig(config);
  if (!encoded) return;
  const url = location.origin + location.pathname + '#c=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    toast('🔗 Share link copied!');
  }).catch(() => {
    toast('⚠️ Could not copy — try manually');
  });
}
function loadFromURL() {
  const hash = location.hash;
  if (hash.startsWith('#c=')) {
    const decoded = decodeConfig(hash.slice(3));
    if (isValidConfig(decoded)) return decoded;
  }
  return null;
}

/* ── Helpers ─────────────────────────────────────────────────────────────── */
function nextPaletteColor() {
  return PALETTE[config.segments.length % PALETTE.length];
}

/* ── Canvas & drawing ────────────────────────────────────────────────────── */
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');

function drawWheel(rotation) {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const segs = config.segments;
  const N = segs.length;
  if (N === 0) return;

  const r = Math.min(cx, cy) - 8;
  const segAngle = (2 * Math.PI) / N;

  ctx.clearRect(0, 0, W, H);

  /* Outer shadow glow */
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  /* Segments */
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  for (let i = 0; i < N; i++) {
    const seg = segs[i];
    const startAngle = -Math.PI / 2 + i * segAngle;
    const endAngle   = startAngle + segAngle;
    const midAngle   = startAngle + segAngle / 2;

    /* Segment fill */
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, r, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();

    /* Radial gradient overlay for depth */
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, r, startAngle, endAngle);
    ctx.closePath();
    const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
    rg.addColorStop(0.3, 'rgba(255,255,255,0.15)');
    rg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = rg;
    ctx.fill();

    /* Edge separator */
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    /* Inner highlight arc */
    ctx.beginPath();
    ctx.arc(0, 0, r - 3, startAngle + 0.04, endAngle - 0.04);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 5;
    ctx.stroke();

    /* Text */
    ctx.save();
    ctx.rotate(midAngle);

    const textR = r * 0.70;
    const fontSize = Math.max(13, Math.min(22, (segAngle * r) / 6));
    ctx.font = `bold ${fontSize}px 'Avenir Next', -apple-system, sans-serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 4;

    const label = (seg.emoji ? seg.emoji + ' ' : '') + seg.text;
    const maxWidth = textR - 28;

    /* Truncate if needed */
    let displayText = label;
    if (ctx.measureText(displayText).width > maxWidth) {
      while (ctx.measureText(displayText + '…').width > maxWidth && displayText.length > 1) {
        displayText = displayText.slice(0, -1);
      }
      displayText += '…';
    }

    ctx.fillText(displayText, textR, 0);
    ctx.restore();
  }

  /* Center hub — outer glow ring */
  const hubR = Math.max(18, r * 0.11);
  ctx.beginPath();
  ctx.arc(0, 0, hubR + 4, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(0,99,229,0.3)';
  ctx.shadowColor = '#0063e5';
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.shadowBlur = 0;

  /* Hub fill — blue gradient */
  ctx.beginPath();
  ctx.arc(0, 0, hubR, 0, 2 * Math.PI);
  const hg = ctx.createRadialGradient(-hubR*0.2, -hubR*0.2, 0, 0, 0, hubR);
  hg.addColorStop(0, '#4BA3FF');
  hg.addColorStop(0.5, '#0063e5');
  hg.addColorStop(1, '#1E5ACC');
  ctx.fillStyle = hg;
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.shadowBlur = 0;

  /* Hub border */
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();

  /* Hub shine highlight */
  ctx.beginPath();
  ctx.arc(-hubR*0.25, -hubR*0.25, hubR*0.35, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();

  /* Hub "?" label */
  ctx.font = `bold ${Math.max(10, hubR * 0.7)}px 'Avenir Next', sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('?', 0, 1);

  ctx.restore();
}

/* ── Winner calculation ───────────────────────────────────────────────────── */
function getWinnerIndex(rotation, N) {
  const segAngle = (2 * Math.PI) / N;
  // Pointer is at top (−π/2). In wheel-local space the pointer maps to angle:
  // normalized = (−rotation) mod 2π
  const norm = ((-rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(norm / segAngle) % N;
}

/* ── Rig helpers ──────────────────────────────────────────────────────────── */
function segmentKey(seg) {
  return seg.key ? seg.key.toUpperCase() : seg.text[0].toUpperCase();
}

/* ── Spin animation ───────────────────────────────────────────────────────── */
function animateSpin(spinAmount) {
  const N = config.segments.length;
  const startRotation = currentRotation;
  const duration      = 3500 + Math.random() * 500;
  const startTime     = performance.now();
  const btn = document.getElementById('btn-spin');

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    currentRotation = startRotation + spinAmount * easeOut(t);
    drawWheel(currentRotation);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      currentRotation = startRotation + spinAmount;
      drawWheel(currentRotation);
      spinning = false;
      btn.disabled = false;
      btn.classList.remove('spinning');
      btn.textContent = 'SPIN';
      const winner = getWinnerIndex(currentRotation, N);
      showResult(winner);
    }
  }

  requestAnimationFrame(frame);
}

function spin() {
  if (spinning || config.segments.length < 2) return;
  spinning = true;
  const btn = document.getElementById('btn-spin');
  btn.disabled = true;
  btn.classList.add('spinning');
  btn.textContent = 'Spinning…';
  const spinAmount = (5 + Math.random() * 4) * 2 * Math.PI;
  animateSpin(spinAmount);
}

function spinToTarget(targetIdx) {
  if (spinning || config.segments.length < 2) return;
  spinning = true;
  const btn = document.getElementById('btn-spin');
  btn.disabled = true;
  btn.classList.add('spinning');
  btn.textContent = 'Rigged…';

  const N = config.segments.length;
  const TAU = 2 * Math.PI;
  const segAngle = TAU / N;
  /* Phase needed so pointer (top) lands in centre of targetIdx's segment */
  const targetPhase = (TAU - (targetIdx * segAngle + segAngle / 2) + TAU) % TAU;
  const currentPhase = ((-currentRotation) % TAU + TAU) % TAU;
  const deltaToTarget = (targetPhase - currentPhase + TAU) % TAU;
  const spinAmount = 5 * TAU + deltaToTarget;
  animateSpin(spinAmount);
}

/* ── Result overlay ───────────────────────────────────────────────────────── */
function showResult(idx) {
  const seg = config.segments[idx];
  const overlay = document.getElementById('result-overlay');

  document.getElementById('res-emoji').textContent = seg.emoji || '🎉';
  document.getElementById('res-text').textContent = seg.text;
  document.getElementById('res-color-bar').style.background = seg.color;

  const excusesEl = document.getElementById('res-excuses');
  const msgEl = document.getElementById('res-message');

  if (seg.message && seg.message.includes('|')) {
    /* Pipe-separated: show as excuse cards */
    const parts = seg.message.split('|').map(s => s.trim()).filter(Boolean);
    excusesEl.innerHTML = '';
    parts.forEach(txt => {
      const item = document.createElement('div');
      item.className = 'result-excuse-item';
      item.style.setProperty('--item-color', seg.color);
      item.textContent = txt;
      excusesEl.appendChild(item);
    });
    excusesEl.style.display = 'flex';
    const winMsg = (config.winMessage || '🎉 {emoji} {result}!')
      .replace('{emoji}', seg.emoji || '').replace('{result}', seg.text);
    msgEl.textContent = winMsg;
  } else {
    excusesEl.style.display = 'none';
    excusesEl.innerHTML = '';
    const raw = seg.message || config.winMessage || '🎉 {emoji} {result}!';
    msgEl.textContent = raw.replace('{emoji}', seg.emoji || '').replace('{result}', seg.text);
  }

  overlay.classList.add('show');
  spawnConfetti(seg.color);
}

function closeResult() {
  document.getElementById('result-overlay').classList.remove('show');
}

/* ── Confetti ────────────────────────────────────────────────────────────── */
function spawnConfetti(baseColor) {
  const colors = [baseColor, '#ffffff', '#a78bfa', '#60a5fa', '#fcd34d', '#f9a8d4'];
  const count = window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 60;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${4 + Math.random() * 8}px;
      height: ${4 + Math.random() * 8}px;
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove(), { once: true });
    setTimeout(() => el.remove(), 4000);
  }
}

/* ── Settings panel ───────────────────────────────────────────────────────── */
let settingsOpen = false;

function toggleSettings() {
  settingsOpen = !settingsOpen;
  const drawer = document.getElementById('settings-drawer');
  drawer.classList.toggle('closed', !settingsOpen);
  if (settingsOpen) renderSettingsForm();
}

function renderSettingsForm() {
  /* Populate header fields */
  document.getElementById('cfg-icon').value = config.icon || '🎡';
  document.getElementById('cfg-title').value = config.title || '';
  document.getElementById('cfg-win-msg').value = config.winMessage || '🎉 {emoji} {result}!';

  /* Render segment rows */
  const list = document.getElementById('segments-list');
  list.innerHTML = '';
  config.segments.forEach(seg => {
    list.appendChild(buildSegmentRow(seg));
  });
  document.getElementById('seg-count').textContent = config.segments.length;
}

function buildSegmentRow(seg) {
  const wrap = document.createElement('div');
  wrap.dataset.id = seg.id;

  const row = document.createElement('div');
  row.className = 'segment-row';

  const emojiInput = document.createElement('input');
  emojiInput.className = 'seg-emoji-input';
  emojiInput.type = 'text';
  emojiInput.maxLength = 4;
  emojiInput.placeholder = '🎯';
  emojiInput.value = seg.emoji || '';
  emojiInput.title = 'Emoji or icon';

  const textInput = document.createElement('input');
  textInput.className = 'seg-text-input form-input';
  textInput.type = 'text';
  textInput.placeholder = 'Option text';
  textInput.value = seg.text || '';

  const colorInput = document.createElement('input');
  colorInput.className = 'seg-color-input';
  colorInput.type = 'color';
  colorInput.value = seg.color || '#7c3aed';
  colorInput.title = 'Segment color';

  const msgToggle = document.createElement('button');
  msgToggle.className = 'btn-seg-msg-toggle' + (seg.message ? ' has-msg' : '');
  msgToggle.title = 'Custom result message';
  msgToggle.textContent = '💬';

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn-seg-delete';
  deleteBtn.title = 'Remove option';
  deleteBtn.innerHTML = '×';
  deleteBtn.addEventListener('click', () => {
    if (config.segments.length <= 2) { toast('⚠️ Need at least 2 options'); return; }
    config.segments = config.segments.filter(s => s.id !== seg.id);
    wrap.remove();
    document.getElementById('seg-count').textContent = config.segments.length;
    drawWheel(currentRotation);
  });

  row.append(emojiInput, textInput, colorInput, msgToggle, deleteBtn);

  /* Message sub-row */
  const msgRow = document.createElement('div');
  msgRow.className = 'seg-msg-row' + (seg.message ? ' open' : '');
  const msgInput = document.createElement('input');
  msgInput.className = 'seg-msg-input';
  msgInput.type = 'text';
  msgInput.placeholder = 'Message when selected… Use | to separate multiple for variety';
  msgInput.value = seg.message || '';
  msgRow.appendChild(msgInput);

  msgToggle.addEventListener('click', () => {
    msgRow.classList.toggle('open');
    msgToggle.classList.toggle('has-msg', msgRow.classList.contains('open'));
  });

  /* Live update segment on input */
  [emojiInput, textInput, colorInput, msgInput].forEach(el => {
    el.addEventListener('input', () => {
      seg.emoji   = emojiInput.value.trim();
      seg.text    = textInput.value;
      seg.color   = colorInput.value;
      seg.message = msgInput.value;
      drawWheel(currentRotation);
    });
  });

  wrap.append(row, msgRow);
  return wrap;
}

function addSegment() {
  const seg = {
    id: ++nextId,
    emoji: '',
    text: 'Option ' + (config.segments.length + 1),
    color: PALETTE[config.segments.length % PALETTE.length],
    message: '',
  };
  config.segments.push(seg);
  const list = document.getElementById('segments-list');
  list.appendChild(buildSegmentRow(seg));
  document.getElementById('seg-count').textContent = config.segments.length;
  drawWheel(currentRotation);
  /* Scroll to new row */
  list.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function applySettings() {
  config.icon       = document.getElementById('cfg-icon').value.trim() || '🎡';
  config.title      = document.getElementById('cfg-title').value.trim() || 'Decision Wheel';
  config.winMessage = document.getElementById('cfg-win-msg').value || '🎉 {emoji} {result}!';
  /* Segments are live-updated on input, but re-read for safety */
  document.getElementById('settings-drawer').querySelectorAll('[data-id]').forEach(wrap => {
    const id = parseInt(wrap.dataset.id);
    const seg = config.segments.find(s => s.id === id);
    if (!seg) return;
    seg.emoji   = wrap.querySelector('.seg-emoji-input').value.trim();
    seg.text    = wrap.querySelector('.seg-text-input').value;
    seg.color   = wrap.querySelector('.seg-color-input').value;
    seg.message = wrap.querySelector('.seg-msg-input').value;
  });
  applyConfigToUI();
  saveToStorage();
  /* Write URL hash for bookmarking */
  const encoded = encodeConfig(config);
  if (encoded) history.replaceState(null, '', '#c=' + encoded);
  toggleSettings();
  toast('✓ Settings saved');
}

function applyConfigToUI() {
  document.getElementById('display-title').textContent = config.title;
  document.getElementById('display-icon').textContent  = config.icon;
  document.getElementById('header-title').textContent  = config.title;
  drawWheel(currentRotation);
}

function loadTemplate(name) {
  if (!TEMPLATES[name]) return;
  config = deepClone(TEMPLATES[name]);
  applyConfigToUI();
  saveToStorage();
  renderSettingsForm();
  history.replaceState(null, '', location.pathname);
  toast('✓ Loaded: ' + config.title);
}

function resetToDefault() {
  if (!confirm('Reset to default wheel?')) return;
  config = deepClone(DEFAULT_CONFIG);
  applyConfigToUI();
  saveToStorage();
  renderSettingsForm();
  history.replaceState(null, '', location.pathname);
}

/* ── Help menu ───────────────────────────────────────────────────────────── */
let helpOpen = false;

function toggleHelpMenu() {
  helpOpen = !helpOpen;
  const menu = document.getElementById('help-menu');
  menu.classList.toggle('show', helpOpen);
  if (helpOpen) {
    renderHelpShortcuts();
    /* Close on next outside click */
    setTimeout(() => {
      document.addEventListener('click', function closeHelp(e) {
        if (!menu.contains(e.target) && !e.target.closest('.help-button')) {
          helpOpen = false;
          menu.classList.remove('show');
        }
        document.removeEventListener('click', closeHelp);
      });
    }, 0);
  }
}

function renderHelpShortcuts() {
  const container = document.getElementById('help-rig-rows');
  container.innerHTML = '';
  config.segments.forEach(seg => {
    const row = document.createElement('div');
    row.className = 'help-row';
    row.innerHTML = `<span>${seg.emoji || ''} ${seg.text}</span><kbd class="help-key">${segmentKey(seg)}</kbd>`;
    container.appendChild(row);
  });
}

/* ── Explosion easter egg ────────────────────────────────────────────────── */
function triggerExplosion() {
  const overlay = document.getElementById('explosion-overlay');
  const container = document.getElementById('explosion-particles');
  container.innerHTML = '';
  const colors = ['#0063e5','#4BA3FF','#8A4FFF','#00A8E1','#ffffff','#a78bfa'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 100 + Math.random() * 300;
    p.style.cssText = `
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
      animation-delay: ${Math.random() * 0.1}s;
      width: ${4 + Math.random() * 10}px;
      height: ${4 + Math.random() * 10}px;
    `;
    container.appendChild(p);
  }
  overlay.classList.add('show');
}

function closeExplosion() {
  document.getElementById('explosion-overlay').classList.remove('show');
}

/* ── Toast ───────────────────────────────────────────────────────────────── */
function toast(msg, dur = 2500) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.classList.add('out');
    el.addEventListener('animationend', () => el.remove(), { once: true });
    setTimeout(() => el.remove(), 300);
  }, dur);
}

/* ── Init ────────────────────────────────────────────────────────────────── */
(function init() {
  /* Priority: URL hash > localStorage (if version matches) > default */
  const fromURL     = loadFromURL();
  const fromStorage = !fromURL && loadFromStorage();
  if (fromURL) config = fromURL;
  else if (fromStorage && fromStorage.version === DEFAULT_CONFIG.version) config = fromStorage;

  /* Assign unique IDs if missing */
  config.segments.forEach((s, i) => { if (!s.id) s.id = ++nextId; });

  applyConfigToUI();

  /* Canvas click/touch → spin */
  canvas.addEventListener('click', () => spin());
  canvas.style.cursor = 'pointer';

  /* Keyboard: Space/Enter = spin, 8 = explosion, letter keys = rig spin */
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    /* Close explosion on any key */
    const explosionOverlay = document.getElementById('explosion-overlay');
    if (explosionOverlay.classList.contains('show')) { closeExplosion(); return; }
    if (e.key === '8') { triggerExplosion(); return; }
    if (e.key === '?') { toggleHelpMenu(); return; }
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); spin(); return; }
    const k = e.key.toUpperCase();
    const idx = config.segments.findIndex(s => segmentKey(s) === k);
    if (idx !== -1) { toast('🎯 Rigging: ' + config.segments[idx].text); spinToTarget(idx); }
  });

  /* ?settings in URL → open settings */
  if (new URLSearchParams(location.search).has('settings')) toggleSettings();
})();
</script>
